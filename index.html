<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Imatra Rescue - Larger Markers</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    
    <script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">
    
    <script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" type="text/css">

    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #222; }
        #map { position: absolute; top: 0; bottom: 0; width: 100%; height: 100%; z-index: 1; }
        
        .info-panel {
            position: absolute; top: 15px; left: 15px; z-index: 10;
            background-color: rgba(255, 255, 255, 0.95); padding: 15px; border-radius: 12px;
            box-shadow: 0 4px 25px rgba(0,0,0,0.3); width: 320px;
            max-height: 90vh; display: flex; flex-direction: column;
        }

        @media (max-width: 600px) {
            .info-panel {
                top: 10px; left: 10px; right: 10px;
                width: auto;
                max-height: 55vh;
                padding: 10px;
            }
        }

        .search-group { 
            margin-bottom: 15px; 
            position: relative; 
        }
        
        .search-group:first-of-type { z-index: 100; }
        .search-group:nth-of-type(2) { z-index: 90; }

        .search-label { 
            font-size: 10px; font-weight: bold; color: #666; 
            margin-bottom: 4px; display: block; text-transform: uppercase; 
        }

        .mapboxgl-ctrl-geocoder { 
            min-width: 100% !important; 
            width: 100% !important;
            box-shadow: none !important;
            border: 1px solid #ddd;
        }

        .station-card { border-left: 4px solid #e11d48; padding-left: 10px; margin-top: 10px; }
        #instructions { margin-top: 10px; overflow-y: auto; font-size: 0.85em; border-top: 1px solid #eee; padding-top: 8px; }
        
        .step { 
            display: flex; justify-content: space-between; 
            margin-bottom: 8px; border-bottom: 1px solid #f0f0f0; padding-bottom: 4px; 
        }
        .step-dist { font-weight: bold; color: #2563eb; margin-left: 8px; white-space: nowrap; }
        
        #current-loc-btn {
            background-color: #2563eb; color: white; border: none; border-radius: 6px;
            padding: 10px; cursor: pointer; font-size: 0.85em; margin-bottom: 15px;
            font-weight: bold; width: 100%;
        }
    </style>
</head>
<body>

<div class="info-panel">
    <h2 style="margin: 0 0 10px 0; color: #e11d48; font-size: 1.1em;">Rescue Services Imatra</h2>
    
    <button id="current-loc-btn">📍 USE MY CURRENT LOCATION</button>

    <div class="search-group">
        <span class="search-label">START POINT</span>
        <div id="start-geocoder"></div>
    </div>

    <div class="search-group">
        <span class="search-label">DESTINATION</span>
        <div id="dest-geocoder"></div>
    </div>

    <div id="output-panel" style="display:none; overflow-y: auto;">
        <div class="station-card">
            <div id="dest-name" style="font-weight:bold;"></div>
            <div id="dest-info" style="font-size:0.8em; color: #444;"></div>
        </div>
        <div style="margin-top:8px; font-size:0.9em; font-weight: bold; background: #f4f4f4; padding: 5px; border-radius: 4px;">
            Dist: <span id="route-dist" style="color:#2563eb;">-</span> | 
            Time: <span id="route-time">-</span>
        </div>
        <div id="instructions"></div>
    </div>
</div>

<div id="map"></div>

<script>
    const myToken = 'pk.eyJ1IjoicHVzZW5pdXNtIiwiYSI6ImNtbGF4dnJkdTBmaGkzZ3I0MnF4cHdramMifQ.Qu_chBm1vHHidv0tZZ77mA';
    mapboxgl.accessToken = myToken;

    const stations = [
        { name: "Imatran paloasema", coords: [28.802606, 61.212504], info: "Unita: EK202, EK206" },
        { name: "Tainionkosken VPK", coords: [28.745036, 61.187443], info: "Unita: EK222, EK227" },
        { name: "Joutsenon paloasema", coords: [28.489787, 61.119090], info: "Units: EK411, EK413, EK417" },
        { name: "Imatran VPK", coords: [28.793877, 61.170751], info: "Units: EK211, EK213, EK217" },
        { name: "Ruokolahden VPK", coords: [28.850206, 61.280868], info: "Units: EK231, E233, EK2398" },
        { name: "Lappeenrannan paloasema", coords: [28.237523, 61.060792], info: "Units: EK101, EK103, EK106" },
        { name: "Simpeleen VPK", coords: [29.360733, 61.434642], info: "Units: EK251, EK253, EK257" },
        { name: "Taipalsaaren paloasema", coords: [28.076100, 61.153183], info: "Units: EK352, EK353" },
        { name: "Lavolan paloasema", coords: [28.111246, 61.040891], info: "Units: EK302, EK306" },
        { name: "Tirilän VPK", coords: [28.237887, 61.057333], info: "Units: EK131, EK133" },
        { name: "Rutolan VPK", coords: [28.043561, 61.041917], info: "Units: EK191, EK193" },
        { name: "Nuijamaan VPK", coords: [28.529505, 60.959594], info: "Units: EK161, EK163" },
        { name: "Lemin VPK", coords: [27.807265, 61.059921], info: "Units: EK342, EK343" },
        { name: "Parikkalan VPK", coords: [29.503653, 61.549309], info: "Units: EK261, EK263" },
        { name: "Savitaipaleen VPK", coords: [27.683248, 61.198784], info: "Units: EK311, EK313" },
        { name: "Luumäen VPK", coords: [27.554962, 60.921391], info: "Units: EK321, EK323" },
        { name: "Lappeenrannan VPK", coords: [28.202396, 61.051788], info: "Units: EK121, EK123, EK127" },
        { name: "Rautjärven VPK", coords: [29.090613, 61.302278], info: "Units: EK241, EK243, EK2415" }
        
    ];

    const map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: [28.85, 61.23],
        zoom: 10
    });

    let startLoc = [28.85, 61.23];
    let endLoc = null;
    let startMarker = new mapboxgl.Marker({ color: '#2563eb' }).setLngLat(startLoc).addTo(map);

    map.on('load', () => {
        stations.forEach(s => {
            const el = document.createElement('div');
            // KORJATTU: Koko 1.5x (15px * 1.5 = 22.5px)
            el.style.width = '22.5px'; 
            el.style.height = '22.5px';
            
            el.style.backgroundColor = '#e11d48'; el.style.borderRadius = '50%';
            el.style.border = '2px solid white'; el.style.cursor = 'pointer';
            new mapboxgl.Marker(el).setLngLat(s.coords).addTo(map);
            el.addEventListener('click', () => {
                endLoc = s.coords;
                getRoute(s.coords, s.name, s.info);
            });
        });
    });

    document.getElementById('current-loc-btn').addEventListener('click', () => {
        navigator.geolocation.getCurrentPosition(p => {
            startLoc = [p.coords.longitude, p.coords.latitude];
            startMarker.setLngLat(startLoc);
            map.flyTo({ center: startLoc, zoom: 12 });
            if (endLoc) getRoute(endLoc, document.getElementById('dest-name').innerText, document.getElementById('dest-info').innerText);
        });
    });

    function customSearch(query) {
        const matches = [];
        stations.forEach(s => {
            if (s.name.toLowerCase().includes(query.toLowerCase())) {
                matches.push({
                    center: s.coords,
                    geometry: { type: 'Point', coordinates: s.coords },
                    place_name: '🚒 ' + s.name,
                    properties: { title: s.name, info: s.info },
                    type: 'Feature'
                });
            }
        });
        return matches;
    }

    const startGeocoder = new MapboxGeocoder({
        accessToken: myToken, mapboxgl: mapboxgl, localGeocoder: customSearch,
        placeholder: 'Search start address...', countries: 'fi'
    });
    document.getElementById('start-geocoder').appendChild(startGeocoder.onAdd(map));

    const destGeocoder = new MapboxGeocoder({
        accessToken: myToken, mapboxgl: mapboxgl, localGeocoder: customSearch,
        placeholder: 'Search destination...', countries: 'fi'
    });
    document.getElementById('dest-geocoder').appendChild(destGeocoder.onAdd(map));

    startGeocoder.on('result', e => {
        startLoc = e.result.center;
        startMarker.setLngLat(startLoc);
        if (endLoc) getRoute(endLoc, document.getElementById('dest-name').innerText, document.getElementById('dest-info').innerText);
    });

    destGeocoder.on('result', e => {
        const info = (e.result.properties && e.result.properties.info) ? e.result.properties.info : e.result.place_name;
        endLoc = e.result.center;
        getRoute(e.result.center, e.result.text || e.result.place_name, info);
    });

    async function getRoute(end, name, info) {
        const url = `https://api.mapbox.com/directions/v5/mapbox/driving/${startLoc[0]},${startLoc[1]};${end[0]},${end[1]}?steps=true&geometries=geojson&language=en&access_token=${myToken}`;
        const res = await fetch(url);
        const data = await res.json();
        if (!data.routes || data.routes.length === 0) return;
        const route = data.routes[0];

        document.getElementById('output-panel').style.display = 'block';
        document.getElementById('dest-name').innerText = name;
        document.getElementById('dest-info').innerText = info;
        document.getElementById('route-dist').innerText = (route.distance / 1000).toFixed(1) + " km";
        document.getElementById('route-time').innerText = Math.floor(route.duration / 60) + " min";

        let stepsHTML = '';
        route.legs[0].steps.forEach(s => {
            const distLabel = s.distance >= 1000 
                ? (s.distance / 1000).toFixed(1) + " km" 
                : Math.round(s.distance) + " m";

            stepsHTML += `
                <div class="step">
                    <span>${s.maneuver.instruction}</span>
                    <span class="step-dist">${distLabel}</span>
                </div>`;
        });
        document.getElementById('instructions').innerHTML = stepsHTML;

        const sourceData = { type: 'Feature', geometry: route.geometry };
        if (map.getSource('route')) {
            map.getSource('route').setData(sourceData);
        } else {
            map.addLayer({
                id: 'route', type: 'line', source: { type: 'geojson', data: sourceData },
                paint: { 'line-color': '#2563eb', 'line-width': 5, 'line-opacity': 0.75 }
            });
        }
        
        const bounds = new mapboxgl.LngLatBounds();
        route.geometry.coordinates.forEach(c => bounds.extend(c));
        map.fitBounds(bounds, { padding: {top: 100, bottom: 50, left: 50, right: 50} });
    }
</script>

</body>
</html>
